name: Sync PDF from Private Docs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

permissions:
  contents: write

jobs:
  update-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AIrcraft (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          submodules: recursive

      - name: Update docs submodule to latest origin/main
        shell: bash
        run: |
          set -euxo pipefail
          cd docs
          git fetch --prune origin main
          git checkout -B main origin/main
          git reset --hard origin/main
          cd -

      - name: Build PDF from LaTeX (docs/main.tex)
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-bibtex-extra biber texlive-fonts-recommended texlive-fonts-extra          cd docs
          latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex
          test -f main.pdf
          cd -

      - name: Copy latest PDF
        run: |
          set -euxo pipefail
          mkdir -p public-docs
          cp docs/main.pdf public-docs/aircraft-documentation.pdf

      - name: Commit and push PDF
        run: |
          set -euxo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public-docs/aircraft-documentation.pdf
          git commit -m "Update public PDF from private docs" || echo "No changes"
          git push
